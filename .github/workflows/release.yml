name: Release

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - ".github/workflows/release.yml"
      - "src/**"
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "styles.css"
      - "versions.json"
      - "esbuild.config.mjs"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, attest, and update"
        required: true
        type: string
      skip_tests:
        description: "Skip npm test for historical release rebuilds"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      EVENT_REF_TYPE: ${{ github.ref_type }}
      EVENT_REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            release_tag="$REQUESTED_TAG"
          elif [ "$EVENT_REF_TYPE" = "tag" ]; then
            release_tag="$EVENT_REF_NAME"
          else
            release_tag="$(node -p "require('./manifest.json').version")"
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_tests != true }}
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prepare Obsidian release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          cp dist/main.js release-assets/main.js
          cp manifest.json release-assets/manifest.json
          cp styles.css release-assets/styles.css

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css

      - name: Remove unsupported zip assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null \
            | grep -E '\.zip$' \
            | while read -r asset; do
                gh release delete-asset "$RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" -y || true
              done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
