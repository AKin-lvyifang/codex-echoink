name: Release

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - ".github/workflows/release.yml"
      - "src/**"
      - "manifest.json"
      - "package.json"
      - "package-lock.json"
      - "styles.css"
      - "versions.json"
      - "esbuild.config.mjs"
      - "docs/images/**"
      - "docs/releases/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, attest, and update"
        required: true
        type: string
      skip_tests:
        description: "Skip npm test for historical release rebuilds"
        required: false
        default: false
        type: boolean
      make_latest:
        description: "Mark this release as latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      EVENT_REF_TYPE: ${{ github.ref_type }}
      EVENT_REF_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            release_tag="$REQUESTED_TAG"
          elif [ "$EVENT_REF_TYPE" = "tag" ]; then
            release_tag="$EVENT_REF_NAME"
          else
            release_tag="$(node -p "require('./manifest.json').version")"
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version and release notes
        env:
          ALLOW_MISSING_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          release_version="${RELEASE_TAG#v}"
          if [ "$release_version" != "$manifest_version" ]; then
            echo "Release tag $RELEASE_TAG does not match manifest version $manifest_version."
            exit 1
          fi

          notes="docs/releases/$manifest_version.md"
          if [ ! -f "$notes" ]; then
            if [ "$ALLOW_MISSING_RELEASE_NOTES" = "true" ]; then
              echo "RELEASE_NOTES_FILE=" >> "$GITHUB_ENV"
              echo "Historical rebuild: no release notes file found for $manifest_version."
              exit 0
            fi
            echo "Missing $notes. Every new Release must include structured notes and a hero image."
            exit 1
          fi

          grep -qx "## v$manifest_version" "$notes" || {
            echo "$notes must start with the version heading: ## v$manifest_version"
            exit 1
          }
          grep -q '^### 中文$' "$notes" || {
            echo "$notes must contain the Chinese section before English."
            exit 1
          }
          grep -q '^### English$' "$notes" || {
            echo "$notes must contain an English section."
            exit 1
          }

          hero_path="$(sed -n 's#.*raw.githubusercontent.com/AKin-lvyifang/codex-echoink/main/\(docs/images/[^)]*\)).*#\1#p' "$notes" | head -n 1)"
          if [ -z "$hero_path" ] || [ ! -f "$hero_path" ]; then
            echo "$notes must reference a tracked Release hero under docs/images/."
            exit 1
          fi
          echo "RELEASE_NOTES_FILE=$notes" >> "$GITHUB_ENV"

      - name: Check public repository files
        run: npm run check:public

      - name: Test
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_tests != true }}
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prepare Obsidian release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          cp dist/main.js release-assets/main.js
          cp manifest.json release-assets/manifest.json
          cp styles.css release-assets/styles.css

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css

      - name: Remove unsupported zip assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null \
            | grep -E '\.zip$' \
            | while read -r asset; do
                gh release delete-asset "$RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" -y || true
              done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          make_latest: ${{ github.event_name != 'workflow_dispatch' || inputs.make_latest == true }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css

      - name: Publish structured release notes
        if: env.RELEASE_NOTES_FILE != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$RELEASE_NOTES_FILE"
