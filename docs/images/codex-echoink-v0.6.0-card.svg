<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Codex EchoInk 0.6.0 release card</title>
  <desc id="desc">Release card for the first-run setup guide and knowledge maintenance update.</desc>
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .bg { fill: #f8f1dc; }
      .ink { fill: #202124; }
      .muted { fill: #5f615f; }
      .panel { fill: #fff9ea; stroke: #202124; stroke-width: 4; }
      .accent { fill: #f59e0b; stroke: #202124; stroke-width: 4; }
      .blue { fill: #70c7d4; stroke: #202124; stroke-width: 4; }
      .green { fill: #8bd17c; stroke: #202124; stroke-width: 4; }
      .red { fill: #f17c67; stroke: #202124; stroke-width: 4; }
      .title { font: 700 76px "Avenir Next", "Inter", Arial, sans-serif; letter-spacing: 0; }
      .sub { font: 600 30px "Avenir Next", "Inter", Arial, sans-serif; letter-spacing: 0; }
      .body { font: 500 28px "Avenir Next", "Inter", Arial, sans-serif; letter-spacing: 0; }
      .small { font: 600 22px "Avenir Next", "Inter", Arial, sans-serif; letter-spacing: 0; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; letter-spacing: 0; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <g filter="url(#paper)">
    <rect class="bg" width="1200" height="675"/>
  </g>
  <path d="M76 70 C210 38, 392 54, 526 34" fill="none" stroke="#202124" stroke-width="5" stroke-linecap="round"/>
  <path d="M810 626 C920 648, 1040 631, 1130 650" fill="none" stroke="#202124" stroke-width="5" stroke-linecap="round"/>

  <text x="78" y="118" class="ink title">Codex EchoInk</text>
  <text x="82" y="164" class="muted sub">v0.6.0 setup guide and safer knowledge maintenance</text>

  <g transform="translate(78 220)">
    <rect class="panel" x="0" y="0" width="494" height="320" rx="18"/>
    <rect class="accent" x="28" y="28" width="152" height="48" rx="12"/>
    <text x="48" y="61" class="ink mono">SETUP</text>
    <circle class="green" cx="58" cy="126" r="20"/>
    <path d="M48 124 l8 9 l17 -22" fill="none" stroke="#202124" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="94" y="135" class="ink body">Codex CLI and login</text>
    <circle class="green" cx="58" cy="184" r="20"/>
    <path d="M48 182 l8 9 l17 -22" fill="none" stroke="#202124" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="94" y="193" class="ink body">OpenCode runtime checks</text>
    <rect class="blue" x="32" y="232" width="182" height="52" rx="15"/>
    <text x="72" y="268" class="ink body">Start</text>
    <path d="M240 258 h170" stroke="#202124" stroke-width="5" stroke-linecap="round"/>
    <path d="M393 242 l28 16 l-28 16" fill="none" stroke="#202124" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(628 220)">
    <rect class="panel" x="0" y="0" width="494" height="320" rx="18"/>
    <rect class="blue" x="28" y="28" width="218" height="48" rx="12"/>
    <text x="48" y="61" class="ink mono">KNOWLEDGE</text>
    <path d="M54 118 h160 m-160 42 h236 m-236 42 h192" stroke="#202124" stroke-width="8" stroke-linecap="round"/>
    <rect class="green" x="326" y="95" width="96" height="42" rx="12"/>
    <text x="346" y="124" class="ink small">Raw</text>
    <rect class="accent" x="326" y="153" width="112" height="42" rx="12"/>
    <text x="344" y="182" class="ink small">Index</text>
    <rect class="red" x="326" y="211" width="126" height="42" rx="12"/>
    <text x="344" y="240" class="ink small">Report</text>
    <text x="52" y="284" class="muted small">Ingest + Normalize + Lint</text>
  </g>

  <g transform="translate(78 590)">
    <rect class="green" x="0" y="-36" width="198" height="52" rx="16"/>
    <text x="26" y="-1" class="ink body">Recheck</text>
    <rect class="accent" x="232" y="-36" width="244" height="52" rx="16"/>
    <text x="258" y="-1" class="ink body">No auto install</text>
    <rect class="blue" x="510" y="-36" width="314" height="52" rx="16"/>
    <text x="538" y="-1" class="ink body">No auto agent run</text>
  </g>
</svg>
